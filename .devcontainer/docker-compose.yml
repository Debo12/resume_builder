version: "3.9"

services:

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile

    container_name: resume-backend

    working_dir: /workspace/backend

    volumes:
      - ..:/workspace

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://resume:resume@postgres:5432/resume_db
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - resume-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile

    container_name: resume-frontend

    working_dir: /workspace/frontend

    volumes:
      - ..:/workspace
      - node_modules:/workspace/frontend/node_modules

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    depends_on:
      - backend

    networks:
      - resume-network

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
      POSTGRES_DB: resume_db

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume"]
      interval: 5s
      retries: 20

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - resume-network

  redis:
    image: redis:8

    ports:
      - "6379:6379"

    networks:
      - resume-network

volumes:
  postgres-data:
  node_modules:

networks:
  resume-network: